<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;
font-family:'Montserrat',sans-serif;
color:#fff;
text-align:center;

/* FONDO */

background-image:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
url("gta.png");

background-position:center;
background-size:cover;
background-repeat:no-repeat;

}

.container{
max-width:420px;
margin:auto;
padding:90px 25px 60px;
}

/* TITULO */

h1{
font-family:'Anton',sans-serif;
font-size:3rem;
letter-spacing:2px;
margin-bottom:10px;
text-shadow:0 0 25px rgba(255,140,0,.7);
}

.subtitle{
font-size:.9rem;
letter-spacing:4px;
text-transform:uppercase;
margin-bottom:30px;
opacity:.9;
}

.text{
font-size:1.05rem;
line-height:1.6;
margin-bottom:35px;
}

/* BOTONES */

.btn{

display:block;
position:relative;
overflow:hidden;

padding:20px;
margin-top:18px;

border-radius:14px;
border:2px solid rgba(255,140,0,.7);

color:#fff;
text-decoration:none;

font-family:'Anton',sans-serif;
letter-spacing:2px;

background:linear-gradient(135deg,#1a1a1a,#000);

box-shadow:0 15px 40px rgba(0,0,0,.8);

transition:.25s;

}

.btn:hover{
transform:scale(1.05);
}

/* BRILLO BOTON */

.btn::after{

content:'';
position:absolute;

top:-50%;
left:-60%;

width:25%;
height:200%;

background:rgba(255,255,255,.18);

transform:rotate(30deg);

animation:shine 5s infinite;

}

@keyframes shine{

0%{left:-60%;}
20%{left:120%;}
100%{left:120%;}

}

.btn img{
max-width:180px;
height:auto;
}

/* FOOTER */

.footer{
margin-top:50px;
font-size:.7rem;
letter-spacing:2px;
opacity:.5;
}

</style>
</head>

<body>

<div class="container">

<h1>NAHU</h1>
